  - normalize
  - rescale
  - rescale_extreme
  - rescale_initial
  - rescale_interval
  - rescale_mean
  - rescale_middle
  - standardize
  - to_positive

- title: "Subjective Weighting"
  desc: "Analytic Hierarchy Process (AHP)."
  contents:
  - AHP

- title: "Objective Weighting"
  desc: "Data-driven methods for determining indicator weights."
  contents:
  - entropy_weight
  - critic_weight
  - pca_weight
  - cv_weight

- title: "Weight Combination"
  desc: "Methods for combining subjective and objective weights."
  contents:
  - combine_weights

- title: "Comprehensive Evaluation"
  desc: "Multi-criteria decision making and evaluation methods."
  contents:
  - topsis
  - linear_sum
  - fuzzy_eval
  - rank_sum_ratio

- title: "Grey Relational Analysis"
  desc: "Grey system theory for relational analysis and TOPSIS."
  contents:
  - grey_corr
  - grey_corr_topsis

