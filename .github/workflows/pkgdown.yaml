# Workflow for building pkgdown site
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Install R packages
        run: |
          # Install pak for fast package installation
          install.packages("pak", repos = "https://cloud.r-project.org")

          # Install only hard dependencies (Depends + Imports) from DESCRIPTION
          pak::local_install_deps(dependencies = "hard", upgrade = FALSE)

          # Install vignette builders and pkgdown (needed for building the site)
          pak::pkg_install(c("knitr", "rmarkdown", "quarto", "pkgdown"), upgrade = FALSE)
        shell: Rscript {0}

      - name: Build site
        run: |
          pkgdown::build_site_github_pages(
            new_process = FALSE,
            install = FALSE
          )
        shell: Rscript {0}

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          clean: false
          branch: gh-pages
          folder: docs
